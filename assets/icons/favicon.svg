<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#196444"/>
      <stop offset="100%" stop-color="#0f4c35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Roof -->
  <polygon points="16,5 24.5,14 7.5,14" fill="#10b981"/>
  <!-- Building body -->
  <rect x="8" y="14" width="16" height="12" rx="1" fill="white" opacity="0.92"/>
  <!-- Windows top row -->
  <rect x="10" y="16" width="4" height="3" rx="0.5" fill="#0f4c35" opacity="0.7"/>
  <rect x="14.5" y="16" width="3" height="3" rx="0.5" fill="#0f4c35" opacity="0.7"/>
  <rect x="18.5" y="16" width="3.5" height="3" rx="0.5" fill="#0f4c35" opacity="0.7"/>
  <!-- Door -->
  <rect x="13.5" y="20.5" width="5" height="5.5" rx="0.75" fill="#10b981"/>
  <!-- Flagpole -->
  <line x1="16" y1="1.5" x2="16" y2="5.5" stroke="white" stroke-width="1" opacity="0.8"/>
  <!-- Flag -->
  <rect x="16" y="1.5" width="5" height="3" rx="0.3" fill="#d4a843"/>
</svg>
