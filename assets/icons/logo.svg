<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#196444"/>
      <stop offset="100%" stop-color="#0f4c35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Roof -->
  <polygon points="100,30 155,88 45,88" fill="#10b981"/>
  <!-- Building body -->
  <rect x="46" y="88" width="108" height="76" rx="4" fill="white" opacity="0.92"/>
  <!-- Windows top row -->
  <rect x="58" y="100" width="24" height="19" rx="3" fill="#0f4c35" opacity="0.65"/>
  <rect x="88" y="100" width="24" height="19" rx="3" fill="#0f4c35" opacity="0.65"/>
  <rect x="118" y="100" width="24" height="19" rx="3" fill="#0f4c35" opacity="0.65"/>
  <!-- Windows bottom row -->
  <rect x="58" y="126" width="24" height="18" rx="3" fill="#0f4c35" opacity="0.5"/>
  <rect x="118" y="126" width="24" height="18" rx="3" fill="#0f4c35" opacity="0.5"/>
  <!-- Door -->
  <rect x="84" y="124" width="32" height="40" rx="4" fill="#10b981"/>
  <!-- Door knob -->
  <circle cx="110" cy="146" r="2.5" fill="white" opacity="0.7"/>
  <!-- Flagpole -->
  <line x1="100" y1="10" x2="100" y2="32" stroke="white" stroke-width="3" opacity="0.8"/>
  <!-- Flag -->
  <rect x="100" y="10" width="28" height="17" rx="2" fill="#d4a843"/>
</svg>
